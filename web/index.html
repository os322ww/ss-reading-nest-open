<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;

        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        line-height: 1.6;
        font-size: 16px;
        letter-spacing: 0.2px;
      }

      h1, h2, h3 {
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      :root {
        --bg: #0f0f10;
        --panel: #17171a;
        --card: #1f1f23;
        --text: #e8e8e8;
        --muted: #a0a0a0;
        --border: rgba(255,255,255,0.08);
        --accent: #7c5cff;
      }
    
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "PingFang SC", "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.6;
      }
    
      /* App 容器 */
      #root {
        min-height: 100vh;
        background: radial-gradient(
          circle at top,
          #1a1a1f,
          #0f0f10
        );
      }
    
      /* 卡片系统（Notion核心） */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
        backdrop-filter: blur(10px);
      }
    
      /* 标题系统 */
      h1, h2, h3 {
        letter-spacing: -0.02em;
        font-weight: 600;
      }
    
      h1 {
        font-size: 22px;
      }
    
      h2 {
        font-size: 18px;
        opacity: 0.9;
      }
    
      /* 次要文字 */
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
    
      /* 按钮（Notion风格） */
      button {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
    
      button:hover {
        border-color: var(--accent);
      }
    
      /* iPad优化 */
      @media (min-width: 768px) {
        body {
          font-size: 15px;
        }
    
        #root {
          padding: 24px;
        }
      }
      body {
       color: #e8e8e8 !important;
      }
    </style>
    <!-- App模式核心 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 防止缩放卡顿 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='18' fill='%236f5148'/><text x='32' y='40' text-anchor='middle' font-size='23' fill='white'>S×S</text></svg>" />

    <title>S×S 小窝共读</title>
  </head>
  <body>
    <div id="root">
      <main
        data-startup-fallback
        style="min-height:100vh;padding:24px;background:#211c1a;color:#f3ece8;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      >
        <strong>SxS reading nest startup</strong>
        <p style="max-width:36rem;line-height:1.6">
          If this message stays visible, the app shell loaded but JavaScript did not finish mounting.
          Please refresh the widget or reopen ChatGPT, then send this startup panel to Codex.
        </p>
        <dl style="display:grid;grid-template-columns:max-content 1fr;gap:8px 14px">
          <dt>resourceVersion</dt>
          <dd>app-v19</dd>
          <dt>bootStage</dt>
          <dd>html-loaded</dd>
        </dl>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
}
    </script>
  </body>
</html>
