<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
       body {
        margin: 0;
        padding: 0;
      
        min-height: 100vh;
        width: 100%;
      
        background: #0f0f10;
        color: #e8e8e8;
      
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
      
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      
        line-height: 1.6;
        font-size: 16px;
        letter-spacing: 0.2px;
      }
        :root {
          /* ===== 背景层级 ===== */
          --bg: #0f0f10;
          --panel: #17171a;
          --card: #1f1f23;
        
          /* ===== 文字层级（关键修复）===== */
          --text-primary: #f5f5f5;     /* 主文字 */
          --text-secondary: rgba(255,255,255,0.72); /* 次文字 */
          --text-muted: rgba(255,255,255,0.55);      /* 弱文字 */
        
          /* ===== 边框 ===== */
          --border: rgba(255,255,255,0.08);
        
          /* ===== 强调色 ===== */
          --accent: #7c5cff;
        
          /* ===== 状态色（可扩展）===== */
          --success: #2ecc71;
          --warning: #f1c40f;
          --danger: #e74c3c;
        }
        
        /* ===== 全局基础 ===== */
        body {
          margin: 0;
          padding: 0;
        
          background: var(--bg);
          color: var(--text-primary);
        
          font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
            "PingFang SC", "Helvetica Neue", "Inter", sans-serif;
        
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        
          line-height: 1.6;
        }
        
        /* ===== App 容器（消灭黑边关键）===== */
        #root {
          min-height: 100vh;
          width: 100%;
          margin: 0;
          padding: 0;
          background: radial-gradient(circle at top, #1a1a1f, #0f0f10);
        }
        
        /* ===== 卡片系统（Notion核心）===== */
        .card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 14px;
          padding: 16px;
          margin-bottom: 12px;
        }
        
        /* ===== 文字系统 ===== */
        h1, h2, h3 {
          color: var(--text-primary);
          letter-spacing: -0.02em;
          font-weight: 600;
        }
        
        p, span {
          color: var(--text-secondary);
        }
        
        /* 次要信息 */
        .muted {
          color: var(--text-muted);
          font-size: 13px;
        }
        
        /* ===== 按钮（Notion风格）===== */
        button {
          background: var(--panel);
          border: 1px solid var(--border);
          color: var(--text-primary);
        
          padding: 8px 12px;
          border-radius: 10px;
        
          cursor: pointer;
          transition: all 0.15s ease;
        }
        
        button:hover {
          border-color: var(--accent);
          transform: translateY(-1px);
        }
        
        /* ===== iPad优化 ===== */
        @media (min-width: 768px) {
          body {
            font-size: 15px;
          }
        
          #root {
            padding: 20px;
          }
        }
    </style>
    <!-- App模式核心 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 防止缩放卡顿 -->

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='18' fill='%236f5148'/><text x='32' y='40' text-anchor='middle' font-size='23' fill='white'>S×S</text></svg>" />

    <title>S×S 小窝共读</title>
  </head>
  <body>
    <div id="root">
      <main
        data-startup-fallback
        style="min-height:100vh;padding:24px;background:#211c1a;color:#f3ece8;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      >
        <strong>SxS reading nest startup</strong>
        <p style="max-width:36rem;line-height:1.6">
          If this message stays visible, the app shell loaded but JavaScript did not finish mounting.
          Please refresh the widget or reopen ChatGPT, then send this startup panel to Codex.
        </p>
        <dl style="display:grid;grid-template-columns:max-content 1fr;gap:8px 14px">
          <dt>resourceVersion</dt>
          <dd>app-v19</dd>
          <dt>bootStage</dt>
          <dd>html-loaded</dd>
        </dl>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
}
    </script>
  </body>
</html>
