<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
       :root {
          --bg: #0f0f10;
          --panel: #17171a;
          --card: #1f1f23;
        
          --text: #f5f5f5;
          --text-secondary: rgba(160, 82, 45, 1);
          --text-muted: rgba(160, 82, 45, 1);
        
          --border: rgba(160, 82, 45, 1);
          --accent: #7c5cff;
        }
        
        /* ===== 基础 ===== */
        body {
          margin: 0;
          padding: 0;
          min-height: 100vh;
        
          background: var(--bg);
          color: var(--text);
        
          font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
            "SF Pro Text", "Helvetica Neue", sans-serif;
        
          -webkit-font-smoothing: antialiased;
          line-height: 1.6;
        }
        
        /* ===== App容器（防黑边关键）===== */
        #root {
          min-height: 100vh;
          width: 100%;
          margin: 0;
          padding: 0;
          background: radial-gradient(circle at top, #1a1a1f, #0f0f10);
        }
        
        /* ===== 卡片 ===== */
        .card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 14px;
          padding: 16px;
          margin-bottom: 12px;
        }
        
        /* ===== 文字 ===== */
        h1, h2, h3 {
          color: var(--text);
        }
        
        p, span {
          color: var(--text-secondary);
        }
        
        .muted {
          color: var(--text-muted);
        }
        
        /* ===== 按钮（重点修复）===== */
        button {
          background: var(--panel);
          border: 1px solid var(--border);
          color: var(--text);
        
          padding: 8px 12px;
          border-radius: 10px;
        
          cursor: pointer;
        }
        
        button:hover {
          border-color: var(--accent);
        }
    </style>
    <!-- App模式核心 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 防止缩放卡顿 -->

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='18' fill='%236f5148'/><text x='32' y='40' text-anchor='middle' font-size='23' fill='white'>S×S</text></svg>" />

    <title>S×S 小窝共读</title>
  </head>
  <body>
    <div id="root">
      <main
        data-startup-fallback
        style="min-height:100vh;padding:24px;background:#211c1a;color:#f3ece8;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      >
        <strong>SxS reading nest startup</strong>
        <p style="max-width:36rem;line-height:1.6">
          If this message stays visible, the app shell loaded but JavaScript did not finish mounting.
          Please refresh the widget or reopen ChatGPT, then send this startup panel to Codex.
        </p>
        <dl style="display:grid;grid-template-columns:max-content 1fr;gap:8px 14px">
          <dt>resourceVersion</dt>
          <dd>app-v19</dd>
          <dt>bootStage</dt>
          <dd>html-loaded</dd>
        </dl>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
}
    </script>
  </body>
</html>
